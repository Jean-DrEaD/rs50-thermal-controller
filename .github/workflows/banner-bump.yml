name: Bump Banner Version

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  bump-banner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update banner.svg version label
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          # Substitui qualquer texto vXX.YY.ZZ dentro do SVG
          sed -i -E "s/v[0-9]+\.[0-9]+\.[0-9]+/v${VERSION}/g" docs/banner.svg

      - name: Update README cache-buster
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          sed -i -E "s|docs/banner\.svg(\?v=[0-9.]+)?|docs/banner.svg?v=${VERSION}|g" README.md

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/banner.svg README.md
          if ! git diff --cached --quiet; then
            git commit -m "chore(banner): bump to v${{ steps.ver.outputs.version }} [skip ci]"
            git push origin main
          else
            echo "Nada a atualizar."
          fi

      - name: Purge Camo cache
        continue-on-error: true
        run: |
          BANNER_URL=$(curl -s https://github.com/${{ github.repository }} \
            | grep -oE 'https://camo\.githubusercontent\.com/[^"]+banner[^"]*' \
            | head -n1)
          if [ -n "$BANNER_URL" ]; then
            curl -X PURGE "$BANNER_URL"
            echo "Purge enviado para $BANNER_URL"
          fi
