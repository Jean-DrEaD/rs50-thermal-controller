name: Arduino Build & Validate

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - '.github/workflows/arduino-build.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Compile for ESP32-S3
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Install ESP32 core
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@2.0.14

      - name: Install libraries
        run: |
          arduino-cli lib install "FastLED@3.6.0"
          arduino-cli lib install "WebSockets@2.4.1"

      - name: Compile sketch
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32s3:USBMode=hwcdc,CDCOnBoot=cdc,FlashSize=4M,PartitionScheme=default,PSRAM=opi \
            --warnings all \
            --output-dir ./build \
            ./src/rs50_thermal/

      - name: Check binary size
        run: |
          ls -lh ./build/
          echo "✅ Build successful"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: rs50-thermal-firmware-${{ github.sha }}
          path: |
            ./build/*.bin
            ./build/*.elf
          retention-days: 30

  lint:
    name: Code Style Check
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Check for tabs (require spaces)
        run: |
          if grep -rP '\t' src/rs50_thermal/*.ino src/rs50_thermal/*.h; then
            echo "❌ Tabs encontradas — use 2 espaços"
            exit 1
          fi
          echo "✅ Indentação OK"

      - name: Check trailing whitespace
        run: |
          if grep -rP ' +$' src/rs50_thermal/*.ino src/rs50_thermal/*.h; then
            echo "⚠️ Espaços ao final de linha encontrados"
            exit 1
          fi
          echo "✅ Sem trailing whitespace"

      - name: Verify version constant
        run: |
          grep -q 'FW_VERSION "3.3.0"' src/rs50_thermal/config.h || {
            echo "❌ FW_VERSION não corresponde ao esperado"
            exit 1
          }
          echo "✅ Versão consistente"
