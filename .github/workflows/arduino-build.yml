name: Arduino Build & Validate

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - '.github/workflows/arduino-build.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Compile for ESP32-S3
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 core 3.x
        run: |
          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@3.0.7
          arduino-cli core list

      - name: Install libraries (matching local dev environment)
        run: |
          arduino-cli lib install "FastLED@3.7.8"
          arduino-cli lib install "WebSockets@2.7.2"
          arduino-cli lib list

      - name: Compile sketch (ESP32-S3-Zero, no PSRAM)
        run: |
          arduino-cli compile \
            --fqbn "esp32:esp32:esp32s3:USBMode=hwcdc,CDCOnBoot=cdc,FlashSize=4M,PartitionScheme=default,PSRAM=disabled,LoopCore=1,EventsCore=1,DebugLevel=none" \
            --warnings default \
            --output-dir ./build \
            ./src/rs50_thermal/

      - name: Check binary size
        run: |
          ls -lh ./build/
          if ls ./build/*.bin 1> /dev/null 2>&1; then
            BIN_SIZE=$(stat -c%s ./build/*.bin | head -1)
            echo "Firmware size: $BIN_SIZE bytes"
            if [ "$BIN_SIZE" -gt 1310720 ]; then
              echo "::warning::Firmware exceeds 1.25MB - check partition scheme"
            fi
          fi
          echo "Build successful"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: rs50-thermal-firmware-${{ github.sha }}
          path: |
            ./build/*.bin
            ./build/*.elf
          retention-days: 30

  lint:
    name: Code Style Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for tabs (require spaces)
        run: |
          if grep -rP '\t' src/rs50_thermal/*.ino src/rs50_thermal/*.h 2>/dev/null; then
            echo "Tabs found - use 2 spaces"
            exit 1
          fi
          echo "Indentation OK"

      - name: Check trailing whitespace
        run: |
          if grep -rP ' +$' src/rs50_thermal/*.ino src/rs50_thermal/*.h 2>/dev/null; then
            echo "Trailing whitespace found"
            exit 1
          fi
          echo "No trailing whitespace"

      - name: Verify version constant matches v3.3.x
        run: |
          if ! grep -qE 'FW_VERSION\s+"3\.3\.[0-9]+"' src/rs50_thermal/config.h; then
            echo "FW_VERSION must match pattern 3.3.x"
            grep FW_VERSION src/rs50_thermal/config.h || true
            exit 1
          fi
          VERSION=$(grep -oP 'FW_VERSION\s+"\K[^"]+' src/rs50_thermal/config.h)
          echo "Version detected: $VERSION"