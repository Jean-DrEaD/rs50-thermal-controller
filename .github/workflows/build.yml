name: Build Firmware

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'src/**'
      - 'ci/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  ESP32_CORE_VERSION: "2.0.14"
  FQBN: "esp32:esp32:esp32s3:USBMode=hwcdc,CDCOnBoot=cdc,FlashMode=qio,FlashSize=4M,PartitionScheme=default,PSRAM=disabled,LoopCore=1,EventsCore=1,DebugLevel=none"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 core (pinned ${{ env.ESP32_CORE_VERSION }})
        run: |
          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@${{ env.ESP32_CORE_VERSION }}

      - name: Verify ci/libraries.txt exists
        run: |
          if [ ! -f ci/libraries.txt ]; then
            echo "::error file=ci/libraries.txt::Arquivo ci/libraries.txt não encontrado."
            exit 1
          fi
          cat ci/libraries.txt

      - name: Install libraries from ci/libraries.txt
        run: |
          while IFS= read -r lib || [ -n "$lib" ]; do
            trimmed="$(echo "$lib" | tr -d '[:space:]')"
            [ -z "$trimmed" ] && continue
            case "$trimmed" in \#*) continue ;; esac
            echo "==> Installing: $trimmed"
            arduino-cli lib install "$trimmed"
          done < ci/libraries.txt
          arduino-cli lib list

      - name: Stage config.h from example (if missing)
        run: |
          if [ ! -f src/rs50_thermal/config.h ]; then
            cp src/rs50_thermal/config.h.example src/rs50_thermal/config.h
            echo "✅ config.h criado a partir de config.h.example"
          else
            echo "ℹ️  config.h já existe"
          fi
          echo "---- config.h ----"
          cat src/rs50_thermal/config.h

      - name: Compile sketch
        run: |
          mkdir -p build-output
          arduino-cli compile \
            --fqbn "${{ env.FQBN }}" \
            --output-dir ./build-output/rs50_thermal \
            --warnings default \
            src/rs50_thermal

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-build-${{ github.sha }}
          path: build-output/rs50_thermal/*.bin
          if-no-files-found: warn
          retention-days: 14
