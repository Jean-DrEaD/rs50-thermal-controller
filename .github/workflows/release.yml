name: Build & Release RS50 Thermal

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Generate config.h from example
        run: |
          if [ ! -f src/rs50_thermal/config.h.example ]; then
            echo "ERRO: config.h.example não encontrado!"
            exit 1
          fi
          cp src/rs50_thermal/config.h.example src/rs50_thermal/config.h
          sed -i "s|__WIFI_SSID__|${{ secrets.WIFI_SSID }}|g" src/rs50_thermal/config.h
          sed -i "s|__WIFI_PASS__|${{ secrets.WIFI_PASS }}|g" src/rs50_thermal/config.h
          echo "✅ config.h gerado com sucesso"
          echo "--- Conteúdo (sem secrets) ---"
          grep -v "WIFI_" src/rs50_thermal/config.h || true

      - name: Build firmware
        run: pio run

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp .pio/build/*/firmware.bin artifacts/ 2>/dev/null || true
          cp .pio/build/*/firmware.elf artifacts/ 2>/dev/null || true
          ls -la artifacts/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.ref_name }}
          path: artifacts/
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
