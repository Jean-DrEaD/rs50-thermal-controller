name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'

env:
  FQBN: esp32:esp32:esp32s3:USBMode=hwcdc,CDCOnBoot=cdc,FlashMode=qio,FlashSize=4M,PartitionScheme=default,PSRAM=disabled
  SKETCH_DIR: src/rs50_thermal
  CORE_VERSION: 2.0.14

jobs:
  release:
    name: Build & publish release artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract tag version
        id: tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VER="${TAG#v}"
          echo "tag=$TAG"   >> "$GITHUB_OUTPUT"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG -> Version: $VER"

      - name: Validate tag matches FW_VERSION
        run: |
          FW=$(grep -E '^\s*#define\s+FW_VERSION' ${{ env.SKETCH_DIR }}/*.ino \
               | head -1 | awk -F'"' '{print $2}')
          TAG_VER="${{ steps.tag.outputs.version }}"
          echo "FW_VERSION in code : $FW"
          echo "Tag version        : $TAG_VER"
          if [ "$FW" != "$TAG_VER" ]; then
            echo "::error::Tag v$TAG_VER does NOT match FW_VERSION $FW"
            exit 1
          fi

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 core ${{ env.CORE_VERSION }}
        run: |
          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@${{ env.CORE_VERSION }}

      - name: Install libraries
        run: |
          while IFS= read -r line || [ -n "$line" ]; do
            [[ -z "$line" || "$line" =~ ^# ]] && continue
            arduino-cli lib install "$line"
          done < ci/libraries.txt

      - name: Generate config.h from template
        run: cp ${{ env.SKETCH_DIR }}/config.h.example ${{ env.SKETCH_DIR }}/config.h

      - name: Compile firmware
        run: |
          mkdir -p release
          arduino-cli compile \
            --fqbn "${{ env.FQBN }}" \
            --build-path release \
            --export-binaries \
            ${{ env.SKETCH_DIR }}

      - name: Locate and rename binaries
        id: artifacts
        run: |
          VER="${{ steps.tag.outputs.version }}"
          APP=$(find release -name "*.ino.bin" ! -name "*bootloader*" ! -name "*partitions*" | head -1)
          BOOT=$(find release -name "*.bootloader.bin" -o -name "*_bootloader.bin" | head -1)
          PART=$(find release -name "*.partitions.bin" -o -name "*_partitions.bin" | head -1)

          if [ -z "$APP" ];  then echo "::error::app bin not found";        exit 1; fi
          if [ -z "$BOOT" ]; then echo "::error::bootloader bin not found"; exit 1; fi
          if [ -z "$PART" ]; then echo "::error::partitions bin not found"; exit 1; fi

          mkdir -p dist
          cp "$APP"  "dist/rs50_thermal_v${VER}.bin"
          cp "$BOOT" "dist/rs50_thermal_v${VER}_bootloader.bin"
          cp "$PART" "dist/rs50_thermal_v${VER}_partitions.bin"

          ls -lh dist/
          echo "app_size=$(stat -c%s "$APP")" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        run: |
          VER="${{ steps.tag.outputs.version }}"
          cat > release_notes.md <<EOF
          ## RS50 Thermal Controller — v${VER}

          ### 📦 Artifacts
          | Arquivo | Endereço de gravação | Descrição |
          |---|---|---|
          | \`rs50_thermal_v${VER}.bin\`              | \`0x10000\` | Aplicação principal |
          | \`rs50_thermal_v${VER}_bootloader.bin\`   | \`0x0000\`  | Bootloader (apenas recovery) |
          | \`rs50_thermal_v${VER}_partitions.bin\`   | \`0x8000\`  | Tabela de partições (apenas recovery) |

          ### 🔧 3 modos de gravação

          **1. Atualização normal (só app):**
          \`\`\`bash
          esptool.py --chip esp32s3 --port COMx write_flash 0x10000 rs50_thermal_v${VER}.bin
          \`\`\`

          **2. Flash completo (recovery):**
          \`\`\`bash
          esptool.py --chip esp32s3 --port COMx write_flash \\
            0x0     rs50_thermal_v${VER}_bootloader.bin \\
            0x8000  rs50_thermal_v${VER}_partitions.bin \\
            0x10000 rs50_thermal_v${VER}.bin
          \`\`\`

          **3. OTA (recomendado para dispositivo já em campo):**
          \`\`\`powershell
          .\\tools\\flash_ota.ps1 -Bin rs50_thermal_v${VER}.bin
          \`\`\`

          ### ℹ️ Build info
          - Core: \`esp32:esp32@${{ env.CORE_VERSION }}\`
          - FQBN: \`${{ env.FQBN }}\`
          - App size: ${{ steps.artifacts.outputs.app_size }} bytes

          Veja [CHANGELOG.md](./CHANGELOG.md) para detalhes.
          EOF

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: RS50 Thermal Controller ${{ steps.tag.outputs.tag }}
          body_path: release_notes.md
          files: |
            dist/rs50_thermal_v${{ steps.tag.outputs.version }}.bin
            dist/rs50_thermal_v${{ steps.tag.outputs.version }}_bootloader.bin
            dist/rs50_thermal_v${{ steps.tag.outputs.version }}_partitions.bin
          draft: false
          prerelease: false
