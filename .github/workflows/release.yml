name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 core (pinned 2.0.14)
        run: |
          arduino-cli config init --overwrite
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@2.0.14

      - name: Install libraries from ci/libraries.txt
        run: |
          while IFS= read -r lib || [ -n "$lib" ]; do
            [ -z "$lib" ] && continue
            case "$lib" in \#*) continue ;; esac
            echo "Installing: $lib"
            arduino-cli lib install "$lib"
          done < ci/libraries.txt

      - name: Stage config.h from example
        run: |
          cp src/rs50_thermal/config.h.example src/rs50_thermal/config.h

      - name: Compile firmware
        run: |
          mkdir -p release
          arduino-cli compile \
            --fqbn "esp32:esp32:esp32s3:USBMode=hwcdc,CDCOnBoot=cdc,FlashMode=qio,FlashSize=4M,PartitionScheme=default,PSRAM=disabled" \
            --output-dir ./release/rs50_thermal \
            src/rs50_thermal

      - name: Locate and rename artifacts
        id: artifacts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APP=$(find ./release -name "*.ino.bin" | head -1)
          BOOT=$(find ./release -name "*.bootloader.bin" | head -1)
          PART=$(find ./release -name "*.partitions.bin" | head -1)

          cp "$APP"  "./release/rs50_thermal_v${VERSION}.bin"
          cp "$BOOT" "./release/rs50_thermal_v${VERSION}_bootloader.bin"
          cp "$PART" "./release/rs50_thermal_v${VERSION}_partitions.bin"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/rs50_thermal_v${{ steps.artifacts.outputs.version }}.bin
            release/rs50_thermal_v${{ steps.artifacts.outputs.version }}_bootloader.bin
            release/rs50_thermal_v${{ steps.artifacts.outputs.version }}_partitions.bin
          body: |
            ## RS50 Thermal Controller — v${{ steps.artifacts.outputs.version }}

            ### Modos de gravação
            - **Atualização** (só app): grave `rs50_thermal_v${{ steps.artifacts.outputs.version }}.bin` em `0x10000`
            - **Flash completo** (recovery): grave os 3 binários
              - `bootloader.bin` → `0x0`
              - `partitions.bin` → `0x8000`
              - `*.bin` (app)    → `0x10000`
            - **Web Flasher**: arraste os 3 `.bin` na ferramenta web

            Ver `CHANGELOG.md` para detalhes desta versão.
