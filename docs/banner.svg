<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="RS50 Thermal Controller">
  <title>RS50 Thermal Controller — Fail-safe thermal management for RS50 wheel</title>

  <defs>
    <!-- Fundo: mesmo gradiente do dashboard -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2027"/>
      <stop offset="50%" stop-color="#203a43"/>
      <stop offset="100%" stop-color="#2c5364"/>
    </linearGradient>

    <!-- Título: ciano vibrante do dashboard -->
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00c6ff"/>
      <stop offset="100%" stop-color="#0072ff"/>
    </linearGradient>

    <!-- Termômetro: gradiente térmico -->
    <linearGradient id="thermal" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"  stop-color="#4caf50"/>
      <stop offset="40%" stop-color="#ffc107"/>
      <stop offset="70%" stop-color="#ff9800"/>
      <stop offset="100%" stop-color="#f44336"/>
    </linearGradient>

    <!-- Glow do bulbo -->
    <radialGradient id="bulb" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%"  stop-color="#ff6b6b"/>
      <stop offset="70%" stop-color="#f44336"/>
      <stop offset="100%" stop-color="#b71c1c"/>
    </radialGradient>

    <!-- Padrão sutil de circuito -->
    <pattern id="circuit" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M0 30 L20 30 L25 25 L35 25 L40 30 L60 30" stroke="#00c6ff" stroke-width="0.5" fill="none" opacity="0.08"/>
      <path d="M30 0 L30 20 L25 25 M35 25 L30 30 L30 60" stroke="#00c6ff" stroke-width="0.5" fill="none" opacity="0.08"/>
      <circle cx="30" cy="30" r="1.5" fill="#00c6ff" opacity="0.15"/>
    </pattern>

    <!-- Sombra do texto -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fundo -->
  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#circuit)"/>

  <!-- Borda interna sutil -->
  <rect x="8" y="8" width="1184" height="304" rx="14" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- ===== Termômetro (lado esquerdo) ===== -->
  <g transform="translate(120, 60)">
    <!-- Corpo do termômetro (vidro) -->
    <rect x="-18" y="0" width="36" height="180" rx="18" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
    <!-- Coluna térmica -->
    <rect x="-10" y="20" width="20" height="160" rx="10" fill="url(#thermal)" opacity="0.9"/>
    <!-- Bulbo -->
    <circle cx="0" cy="200" r="32" fill="url(#bulb)" filter="url(#glow)"/>
    <circle cx="0" cy="200" r="32" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>

    <!-- Marcações de temperatura -->
    <g font-family="'Segoe UI', Roboto, sans-serif" font-size="11" fill="#8ab4f8" text-anchor="start">
      <line x1="22" y1="30"  x2="32" y2="30"  stroke="#8ab4f8" stroke-width="1"/>
      <text x="38" y="34">68°C — CRITICAL</text>
      <line x1="22" y1="75"  x2="32" y2="75"  stroke="#8ab4f8" stroke-width="1"/>
      <text x="38" y="79">60°C — WARNING</text>
      <line x1="22" y1="120" x2="32" y2="120" stroke="#8ab4f8" stroke-width="1"/>
      <text x="38" y="124">40°C — WARMING</text>
      <line x1="22" y1="165" x2="32" y2="165" stroke="#8ab4f8" stroke-width="1"/>
      <text x="38" y="169">&lt; 40°C — IDLE</text>
    </g>
  </g>

  <!-- ===== Título e subtítulo (centro/direita) ===== -->
  <g transform="translate(440, 0)">
    <text x="0" y="110" font-family="'Segoe UI', Roboto, sans-serif" font-size="64" font-weight="800" fill="url(#title)" filter="url(#glow)">
      RS50 Thermal
    </text>
    <text x="0" y="170" font-family="'Segoe UI', Roboto, sans-serif" font-size="38" font-weight="600" fill="#e0e0e0" opacity="0.95">
      Controller
    </text>

    <!-- Linha separadora -->
    <line x1="0" y1="195" x2="540" y2="195" stroke="url(#title)" stroke-width="2" opacity="0.6"/>

    <!-- Tagline -->
    <text x="0" y="222" font-family="'Segoe UI', Roboto, sans-serif" font-size="15" fill="#8ab4f8" letter-spacing="2">
      FAIL-SAFE THERMAL MANAGEMENT FOR RS50 WHEEL
    </text>

    <!-- Badges de specs -->
    <g transform="translate(0, 245)" font-family="'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600">
      <!-- ESP32-S3 -->
      <g transform="translate(0, 0)">
        <rect width="110" height="28" rx="14" fill="rgba(0,198,255,0.15)" stroke="#00c6ff" stroke-width="1"/>
        <text x="55" y="18" fill="#00c6ff" text-anchor="middle">⚡ ESP32-S3</text>
      </g>
      <!-- NTC 100k -->
      <g transform="translate(120, 0)">
        <rect width="110" height="28" rx="14" fill="rgba(255,193,7,0.15)" stroke="#ffc107" stroke-width="1"/>
        <text x="55" y="18" fill="#ffc107" text-anchor="middle">🌡 NTC 100k</text>
      </g>
      <!-- 24V Relay -->
      <g transform="translate(240, 0)">
        <rect width="110" height="28" rx="14" fill="rgba(244,67,54,0.15)" stroke="#f44336" stroke-width="1"/>
        <text x="55" y="18" fill="#f44336" text-anchor="middle">🛡 24V NC Relay</text>
      </g>
      <!-- Fail-Safe -->
      <g transform="translate(360, 0)">
        <rect width="110" height="28" rx="14" fill="rgba(76,175,80,0.15)" stroke="#4caf50" stroke-width="1"/>
        <text x="55" y="18" fill="#4caf50" text-anchor="middle">✓ Fail-Safe</text>
      </g>
    </g>
  </g>

  <!-- ===== Versão (canto inferior direito) ===== -->
  <g transform="translate(1100, 285)" font-family="'Segoe UI', Roboto, sans-serif">
    <text x="0" y="0" font-size="13" font-weight="700" fill="#00c6ff" text-anchor="end">v3.3.10</text>
    <text x="0" y="16" font-size="10" fill="#8ab4f8" text-anchor="end" opacity="0.7">github.com/Jean-DrEaD/rs50-thermal-controller</text>
  </g>

  <!-- ===== Indicador de status (canto superior direito) ===== -->
  <g transform="translate(1100, 40)">
    <circle cx="0" cy="0" r="6" fill="#4caf50">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="-14" y="4" font-family="'Segoe UI', Roboto, sans-serif" font-size="11" fill="#4caf50" text-anchor="end" font-weight="600">ONLINE</text>
  </g>
</svg>
