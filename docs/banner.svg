<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#302b63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#24243e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="heat" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff" />
      <stop offset="33%" style="stop-color:#00ff88" />
      <stop offset="66%" style="stop-color:#ffaa00" />
      <stop offset="100%" style="stop-color:#ff0044" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g stroke="#ffffff10" stroke-width="1">
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
  </g>
  
  <!-- Logo: Steering wheel -->
  <g transform="translate(120, 150)">
    <circle cx="0" cy="0" r="70" fill="none" stroke="#ff0044" stroke-width="6" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="#ff0044" stroke-width="3" opacity="0.6"/>
    <circle cx="0" cy="0" r="20" fill="#ff0044" filter="url(#glow)"/>
    <line x1="-70" y1="0" x2="-20" y2="0" stroke="#ff0044" stroke-width="6"/>
    <line x1="70" y1="0" x2="20" y2="0" stroke="#ff0044" stroke-width="6"/>
    <line x1="0" y1="-70" x2="0" y2="-20" stroke="#ff0044" stroke-width="6"/>
    <!-- Heat waves -->
    <path d="M -90,-40 Q -100,-50 -90,-60" stroke="#ffaa00" stroke-width="3" fill="none" opacity="0.7"/>
    <path d="M 90,-40 Q 100,-50 90,-60" stroke="#ffaa00" stroke-width="3" fill="none" opacity="0.7"/>
    <path d="M -85,-25 Q -95,-35 -85,-45" stroke="#ffaa00" stroke-width="3" fill="none" opacity="0.5"/>
    <path d="M 85,-25 Q 95,-35 85,-45" stroke="#ffaa00" stroke-width="3" fill="none" opacity="0.5"/>
  </g>
  
  <!-- Title -->
  <text x="280" y="130" font-family="Arial Black, sans-serif" font-size="56" font-weight="900" fill="#ffffff" filter="url(#glow)">
    RS50 THERMAL
  </text>
  <text x="280" y="180" font-family="Arial, sans-serif" font-size="28" fill="#00d4ff" font-weight="bold">
    CONTROLLER
  </text>
  <text x="280" y="220" font-family="Arial, sans-serif" font-size="18" fill="#ffffffaa">
    Direct Drive Wheel Protection • Open Source
  </text>
  
  <!-- Temperature gauge bars (decorative) -->
  <g transform="translate(280, 240)">
    <rect x="0" y="0" width="600" height="12" rx="6" fill="#ffffff20"/>
    <rect x="0" y="0" width="450" height="12" rx="6" fill="url(#heat)" filter="url(#glow)"/>
    <text x="610" y="10" font-family="monospace" font-size="14" fill="#00d4ff" font-weight="bold">75%</text>
  </g>
  
  <!-- Stats badges -->
  <g transform="translate(950, 70)" font-family="Arial, sans-serif">
    <rect x="0" y="0" width="180" height="50" rx="8" fill="#ffffff15" stroke="#00d4ff" stroke-width="1"/>
    <text x="15" y="22" font-size="11" fill="#ffffff80">FW VERSION</text>
    <text x="15" y="42" font-size="20" fill="#00d4ff" font-weight="bold">v3.3.0</text>
    
    <rect x="0" y="60" width="180" height="50" rx="8" fill="#ffffff15" stroke="#ff0044" stroke-width="1"/>
    <text x="15" y="82" font-size="11" fill="#ffffff80">PROTECTION</text>
    <text x="15" y="102" font-size="20" fill="#ff0044" font-weight="bold">FAIL-SAFE</text>
    
    <rect x="0" y="120" width="180" height="50" rx="8" fill="#ffffff15" stroke="#00ff88" stroke-width="1"/>
    <text x="15" y="142" font-size="11" fill="#ffffff80">MCU</text>
    <text x="15" y="162" font-size="20" fill="#00ff88" font-weight="bold">ESP32-S3</text>
  </g>
</svg>
