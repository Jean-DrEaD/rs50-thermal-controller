<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 820" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <style><![CDATA[
      .title    { font-size: 22px; font-weight: 700; fill: #1a1a1a; }
      .subtitle { font-size: 12px; fill: #555; }
      .block    { fill: #f8f9fa; stroke: #2c3e50; stroke-width: 2; rx: 8; }
      .mcu      { fill: #e8f4fd; stroke: #1976d2; stroke-width: 2.5; rx: 10; }
      .power    { fill: #fff4e6; stroke: #e65100; stroke-width: 2; rx: 8; }
      .relay    { fill: #fce4ec; stroke: #c2185b; stroke-width: 2; rx: 8; }
      .sensor   { fill: #e8f5e9; stroke: #2e7d32; stroke-width: 2; rx: 8; }
      .label    { font-size: 12px; fill: #1a1a1a; font-weight: 700; }
      .pin      { font-size: 10px; fill: #333; font-family: 'Consolas', monospace; }
      .wire24   { stroke: #d32f2f; stroke-width: 3; fill: none; }
      .wire12   { stroke: #f57c00; stroke-width: 2.5; fill: none; }
      .wire5    { stroke: #fbc02d; stroke-width: 2; fill: none; }
      .wiregnd  { stroke: #212121; stroke-width: 2; fill: none; }
      .wiresig  { stroke: #1976d2; stroke-width: 1.8; fill: none; }
      .wireac   { stroke: #6a1b9a; stroke-width: 2.8; fill: none; stroke-dasharray: 6 3; }
      .legend   { font-size: 11px; fill: #1a1a1a; }
      .warn     { font-size: 10px; fill: #c2185b; font-weight: 700; }
    ]]></style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>

  <text x="640" y="35" text-anchor="middle" class="title">RS50 Thermal Controller — Wiring Schematic v3.4.0</text>
  <text x="640" y="55" text-anchor="middle" class="subtitle">Hardware fail-safe • Fonte 24V • ESP32-S3-Zero • Rele NC • Fan PWM 25kHz</text>

  <!-- FONTE 24V -->
  <rect x="40" y="100" width="180" height="80" class="power"/>
  <text x="130" y="128" text-anchor="middle" class="label">Fonte 24V</text>
  <text x="130" y="148" text-anchor="middle" class="pin">XDrive Mini</text>
  <text x="130" y="165" text-anchor="middle" class="pin">XT60 macho (chicote)</text>

  <!-- XT60 FEMEA -->
  <rect x="270" y="100" width="120" height="80" class="block"/>
  <text x="330" y="128" text-anchor="middle" class="label">XT60 Femea</text>
  <text x="330" y="148" text-anchor="middle" class="pin">PCB-mount</text>
  <circle cx="290" cy="195" r="4" fill="#d32f2f"/>
  <circle cx="370" cy="195" r="4" fill="#212121"/>
  <text x="290" y="220" text-anchor="middle" class="pin">V+</text>
  <text x="370" y="220" text-anchor="middle" class="pin">GND</text>

  <line x1="220" y1="140" x2="270" y2="140" class="wire24" marker-end="url(#arrow)"/>
  <!-- HW-411 #1 -->
  <rect x="450" y="80" width="180" height="130" class="power"/>
  <text x="540" y="105" text-anchor="middle" class="label">HW-411 #1</text>
  <text x="540" y="124" text-anchor="middle" class="pin">LM2596 24V para 12V</text>
  <text x="540" y="140" text-anchor="middle" class="pin">3A - Ajustar Vout=12.0V</text>
  <text x="468" y="175" class="pin">IN+</text>
  <text x="468" y="200" class="pin">IN-</text>
  <text x="592" y="175" class="pin">OUT+</text>
  <text x="592" y="200" class="pin">OUT-</text>
  <circle cx="458" cy="172" r="3" fill="#d32f2f"/>
  <circle cx="458" cy="197" r="3" fill="#212121"/>
  <circle cx="622" cy="172" r="3" fill="#f57c00"/>
  <circle cx="622" cy="197" r="3" fill="#212121"/>

  <!-- 24V: XT60 -> Buck#1 IN+ -->
  <line x1="290" y1="195" x2="290" y2="172" class="wire24"/>
  <line x1="290" y1="172" x2="458" y2="172" class="wire24"/>

  <!-- GND backbone descendo abaixo dos labels (y=235) -->
  <line x1="370" y1="195" x2="370" y2="235" class="wiregnd"/>
  <line x1="370" y1="235" x2="458" y2="235" class="wiregnd"/>
  <line x1="458" y1="235" x2="458" y2="197" class="wiregnd"/>

  <!-- HW-411 #2 -->
  <rect x="710" y="80" width="180" height="130" class="power"/>
  <text x="800" y="105" text-anchor="middle" class="label">HW-411 #2</text>
  <text x="800" y="124" text-anchor="middle" class="pin">LM2596 12V para 5V</text>
  <text x="800" y="140" text-anchor="middle" class="pin">1A - Ajustar Vout=5.0V</text>
  <text x="728" y="175" class="pin">IN+</text>
  <text x="728" y="200" class="pin">IN-</text>
  <text x="852" y="175" class="pin">OUT+</text>
  <text x="852" y="200" class="pin">OUT-</text>
  <circle cx="718" cy="172" r="3" fill="#f57c00"/>
  <circle cx="718" cy="197" r="3" fill="#212121"/>
  <circle cx="882" cy="172" r="3" fill="#fbc02d"/>
  <circle cx="882" cy="197" r="3" fill="#212121"/>

  <!-- 12V: Buck#1 OUT+ -> Buck#2 IN+ -->
  <line x1="622" y1="172" x2="718" y2="172" class="wire12"/>

  <!-- GND continua: Buck#1 IN- -> Buck#2 IN- (passa em y=235) -->
  <line x1="622" y1="197" x2="622" y2="235" class="wiregnd"/>
  <line x1="622" y1="235" x2="718" y2="235" class="wiregnd"/>
  <line x1="718" y1="235" x2="718" y2="197" class="wiregnd"/>

  <!-- FAN -->
  <rect x="450" y="290" width="180" height="120" class="block"/>
  <text x="540" y="315" text-anchor="middle" class="label">FAN 120mm 4-pin</text>
  <text x="540" y="332" text-anchor="middle" class="pin">12V Intel-style PWM</text>
  <text x="475" y="358" class="pin">+12V (amarelo)</text>
  <text x="475" y="376" class="pin">GND  (preto)</text>
  <text x="475" y="394" class="warn">PWM (azul) - GPIO5</text>
  <text x="540" y="406" text-anchor="middle" class="warn">TACH (verde) NAO USAR</text>

  <!-- 12V para Fan: desce do backbone Buck#1 OUT+ -->
  <line x1="660" y1="172" x2="660" y2="358" class="wire12"/>
  <line x1="660" y1="358" x2="595" y2="358" class="wire12" marker-end="url(#arrow)"/>

  <!-- GND para Fan: usa backbone -->
  <line x1="425" y1="235" x2="425" y2="376" class="wiregnd"/>
  <line x1="425" y1="376" x2="470" y2="376" class="wiregnd" marker-end="url(#arrow)"/>
  <line x1="370" y1="235" x2="425" y2="235" class="wiregnd"/>

  <!-- ESP32-S3-ZERO -->
  <rect x="940" y="280" width="200" height="240" class="mcu"/>
  <text x="1040" y="305" text-anchor="middle" class="label">ESP32-S3-Zero</text>
  <text x="1040" y="322" text-anchor="middle" class="pin">Waveshare</text>
  <text x="960" y="355" class="pin">5V</text>
  <text x="960" y="378" class="pin">GND</text>
  <text x="960" y="410" class="pin">GPIO1  (NTC)</text>
  <text x="960" y="433" class="pin">GPIO4  (RELAY)</text>
  <text x="960" y="456" class="pin">GPIO5  (PWM)</text>
  <text x="960" y="479" class="pin">GPIO21 (LED)</text>
  <circle cx="950" cy="352" r="3" fill="#fbc02d"/>
  <circle cx="950" cy="375" r="3" fill="#212121"/>
  <circle cx="950" cy="407" r="3" fill="#1976d2"/>
  <circle cx="950" cy="430" r="3" fill="#1976d2"/>
  <circle cx="950" cy="453" r="3" fill="#1976d2"/>
  <circle cx="950" cy="476" r="3" fill="#1976d2"/>

  <!-- 5V: Buck#2 OUT+ -> ESP32 5V -->
  <line x1="882" y1="172" x2="915" y2="172" class="wire5"/>
  <line x1="915" y1="172" x2="915" y2="352" class="wire5"/>
  <line x1="915" y1="352" x2="950" y2="352" class="wire5"/>

  <!-- GND para ESP32 -->
  <line x1="882" y1="235" x2="935" y2="235" class="wiregnd"/>
  <line x1="882" y1="197" x2="882" y2="235" class="wiregnd"/>
  <line x1="935" y1="235" x2="935" y2="375" class="wiregnd"/>
  <line x1="935" y1="375" x2="950" y2="375" class="wiregnd"/>

  <!-- GPIO5 (PWM) -> Fan PWM -->
  <line x1="950" y1="453" x2="700" y2="453" class="wiresig"/>
  <line x1="700" y1="453" x2="700" y2="394" class="wiresig"/>
  <line x1="700" y1="394" x2="630" y2="394" class="wiresig" marker-end="url(#arrow)"/>
  <!-- NTC -->
  <rect x="940" y="560" width="200" height="120" class="sensor"/>
  <text x="1040" y="585" text-anchor="middle" class="label">NTC 100K B3950</text>
  <text x="1040" y="602" text-anchor="middle" class="pin">Divisor + filtro</text>
  <text x="950" y="625" class="pin">3V3 - R100K - GPIO1</text>
  <text x="950" y="643" class="pin">      - NTC - GND</text>
  <text x="950" y="661" class="pin">      - C100nF - GND</text>
  <text x="1040" y="676" text-anchor="middle" class="warn">Sonda no eixo do motor</text>

  <!-- GPIO1 -> NTC: rota limpa pela direita -->
  <line x1="950" y1="407" x2="900" y2="407" class="wiresig"/>
  <line x1="900" y1="407" x2="900" y2="585" class="wiresig"/>
  <line x1="900" y1="585" x2="935" y2="585" class="wiresig" marker-end="url(#arrow)"/>

  <!-- MOSFET -->
  <rect x="450" y="450" width="280" height="170" class="block"/>
  <text x="590" y="478" text-anchor="middle" class="label">Driver MOSFET — IRLZ44N</text>
  <text x="590" y="505" text-anchor="middle" class="pin">GPIO4  ──  R 220Ω  ──  Gate</text>
  <text x="590" y="525" text-anchor="middle" class="pin">Gate   ──  R 10K   ──  GND  (pulldown)</text>
  <text x="590" y="548" text-anchor="middle" class="pin">Source = GND</text>
  <text x="590" y="568" text-anchor="middle" class="pin">Drain  = Coil- do rele</text>
  <text x="590" y="595" text-anchor="middle" class="warn">Logic-level: aciona com 3V3</text>

  <!-- GPIO4 -> MOSFET (entra exatamente na borda direita da caixa em y=505) -->
  <line x1="950" y1="430" x2="800" y2="430" class="wiresig"/>
  <line x1="800" y1="430" x2="800" y2="505" class="wiresig"/>
  <line x1="800" y1="505" x2="734" y2="505" class="wiresig" marker-end="url(#arrow)"/>

  <!-- RELE -->
  <rect x="60" y="450" width="220" height="170" class="relay"/>
  <text x="170" y="478" text-anchor="middle" class="label">Rele Songle SLA-24VDC-SL-C</text>
  <text x="170" y="495" text-anchor="middle" class="pin">SPDT 30A — Modo NC</text>
  <text x="75" y="525" class="pin">Coil+ ── +12V (Buck #1)</text>
  <text x="75" y="545" class="pin">Coil- ── Drain MOSFET</text>
  <text x="75" y="572" class="pin">COM   ── AC do ODESC</text>
  <text x="75" y="590" class="pin">NC    ── Motor (fail-safe)</text>
  <text x="75" y="608" class="pin">NO    ── (nao conectar)</text>

  <!-- Aviso do diodo flyback -->
  <rect x="60" y="395" width="220" height="40" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5" rx="4"/>
  <text x="170" y="412" text-anchor="middle" class="warn">⚠ Diodo 1N4007 em paralelo com a bobina</text>
  <text x="170" y="426" text-anchor="middle" class="pin">Catodo no Coil+ • Anodo no Coil-</text>

  <!-- 12V para Coil+: vem do backbone do Buck#1 -->
  <line x1="660" y1="270" x2="40" y2="270" class="wire12"/>
  <line x1="40" y1="270" x2="40" y2="525" class="wire12"/>
  <line x1="40" y1="525" x2="68" y2="525" class="wire12" marker-end="url(#arrow)"/>
  <line x1="660" y1="172" x2="660" y2="270" class="wire12"/>

  <!-- Coil-: do Drain do MOSFET -->
  <line x1="450" y1="568" x2="370" y2="568" class="wiresig"/>
  <line x1="370" y1="568" x2="370" y2="545" class="wiresig"/>
  <line x1="370" y1="545" x2="280" y2="545" class="wiresig" marker-end="url(#arrow)"/>

  <!-- SAIDA AC -->
  <rect x="60" y="680" width="500" height="90" class="block"/>
  <text x="310" y="708" text-anchor="middle" class="label">Saida AC do Motor (chaveada pelo rele NC)</text>
  <text x="310" y="730" text-anchor="middle" class="pin">ODESC.AC ── COM (rele) ── NC ── Motor Hoverboard 15Nm</text>
  <text x="310" y="752" text-anchor="middle" class="warn">SHUTDOWN: ESP energiza bobina → contato abre → motor desliga</text>

  <line x1="170" y1="620" x2="170" y2="680" class="wireac"/>

  <!-- LEGENDA -->
  <rect x="940" y="700" width="320" height="100" fill="#fafafa" stroke="#bdbdbd" stroke-width="1" rx="6"/>
  <text x="1100" y="722" text-anchor="middle" class="label">Legenda</text>

  <line x1="955" y1="740" x2="985" y2="740" class="wire24"/>
  <text x="995" y="744" class="legend">24V</text>
  <line x1="1055" y1="740" x2="1085" y2="740" class="wire12"/>
  <text x="1095" y="744" class="legend">12V</text>
  <line x1="1155" y1="740" x2="1185" y2="740" class="wire5"/>
  <text x="1195" y="744" class="legend">5V</text>

  <line x1="955" y1="765" x2="985" y2="765" class="wiregnd"/>
  <text x="995" y="769" class="legend">GND</text>
  <line x1="1055" y1="765" x2="1085" y2="765" class="wiresig"/>
  <text x="1095" y="769" class="legend">Sinal 3V3</text>
  <line x1="1155" y1="765" x2="1185" y2="765" class="wireac"/>
  <text x="1195" y="769" class="legend">AC motor</text>

  <text x="1100" y="790" text-anchor="middle" class="pin" fill="#666">v3.4.0 — MIT License</text>
</svg>
