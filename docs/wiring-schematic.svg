<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="monospace" font-size="11">
  <style>
    .wire-power{stroke:#c00;stroke-width:2.5;fill:none}
    .wire-gnd{stroke:#000;stroke-width:2;fill:none}
    .wire-signal{stroke:#06c;stroke-width:1.5;fill:none}
    .wire-12v{stroke:#f80;stroke-width:2;fill:none}
    .wire-5v{stroke:#093;stroke-width:1.5;fill:none}
    .ic{fill:#eef;stroke:#333;stroke-width:1.5}
    .label{font-weight:bold}
    .pin{font-size:9px;fill:#444}
    text{font-family:'Courier New',monospace}
  </style>

  <!-- Título -->
  <text x="500" y="25" text-anchor="middle" font-size="16" class="label">RS50 Thermal Controller — Schematic v3.3</text>
  <text x="500" y="42" text-anchor="middle" font-size="11" fill="#666">Sistema de proteção térmica para volante DD com motor Hoverboard 15Nm</text>

  <!-- ====== FONTE 24V ====== -->
  <rect x="30" y="80" width="120" height="80" class="ic"/>
  <text x="90" y="110" text-anchor="middle" class="label">FONTE 24V</text>
  <text x="90" y="128" text-anchor="middle">30A SMPS</text>
  <text x="90" y="148" text-anchor="middle" font-size="9">220V AC IN</text>
  <text x="155" y="108" class="pin">+24V</text>
  <text x="155" y="148" class="pin">GND</text>
  <circle cx="150" cy="105" r="3" fill="#c00"/>
  <circle cx="150" cy="145" r="3" fill="#000"/>

  <!-- ====== CHAVE MASTER ====== -->
  <line x1="153" y1="105" x2="200" y2="105" class="wire-power"/>
  <text x="210" y="80" class="label">Chave ON/OFF</text>
  <line x1="200" y1="105" x2="220" y2="105" class="wire-power"/>
  <line x1="220" y1="105" x2="245" y2="95" class="wire-power"/>
  <circle cx="220" cy="105" r="2" fill="#000"/>
  <circle cx="248" cy="93" r="2" fill="#000"/>
  <line x1="248" y1="93" x2="270" y2="105" class="wire-power" stroke-dasharray="0"/>
  <text x="235" y="125" font-size="9" fill="#888">SPST</text>
  <line x1="270" y1="105" x2="320" y2="105" class="wire-power"/>

  <!-- GND comum -->
  <line x1="153" y1="145" x2="900" y2="145" class="wire-gnd"/>
  <text x="900" y="140" class="pin">GND comum</text>

  <!-- ====== RELÉ SONGLE ====== -->
  <rect x="320" y="75" width="160" height="120" class="ic" fill="#cef"/>
  <text x="400" y="95" text-anchor="middle" class="label">RELÉ SPDT</text>
  <text x="400" y="110" text-anchor="middle">Songle SLA-24VDC-SL-C</text>
  <text x="400" y="125" text-anchor="middle" font-size="9">30A / 30VDC</text>
  <!-- Bobina (símbolo) -->
  <path d="M 340 145 Q 350 135 360 145 Q 370 155 380 145 Q 390 135 400 145" stroke="#333" fill="none" stroke-width="1.5"/>
  <text x="370" y="170" font-size="9" text-anchor="middle">Bobina 24V</text>
  <line x1="320" y1="145" x2="335" y2="145" class="wire-signal"/>
  <line x1="400" y1="145" x2="480" y2="145" class="wire-signal"/>
  <text x="335" y="180" class="pin">A1 (+)</text>
  <text x="445" y="180" class="pin">A2 (-)</text>
  <!-- Contatos -->
  <line x1="320" y1="105" x2="345" y2="105" class="wire-power"/>
  <text x="328" y="100" class="pin">COM</text>
  <line x1="345" y1="105" x2="370" y2="90" stroke="#000" stroke-width="2"/>
  <circle cx="345" cy="105" r="2"/>
  <circle cx="372" cy="88" r="2"/>
  <text x="380" y="80" font-size="9">NO (não usar)</text>
  <line x1="345" y1="105" x2="475" y2="115" class="wire-power" stroke-dasharray="2,2"/>
  <text x="430" y="130" font-size="9" fill="#080">NC ←(repouso)</text>
  <line x1="475" y1="115" x2="540" y2="115" class="wire-power"/>

  <!-- ====== ODESC ====== -->
  <rect x="540" y="75" width="160" height="100" class="ic" fill="#fcc"/>
  <text x="620" y="100" text-anchor="middle" class="label">ODESC FFBeast</text>
  <text x="620" y="118" text-anchor="middle">MKS XDrive Mini</text>
  <text x="620" y="135" text-anchor="middle" font-size="9">+ Motor Hoverboard</text>
  <text x="620" y="150" text-anchor="middle" font-size="9">15Nm DD</text>
  <text x="540" y="115" text-anchor="end" class="pin">+24V</text>
  <line x1="620" y1="175" x2="620" y2="145" class="wire-gnd"/>

  <!-- ====== STEP-DOWNS ====== -->
  <rect x="60" y="260" width="100" height="55" class="ic" fill="#fec"/>
  <text x="110" y="280" text-anchor="middle" class="label">LM2596</text>
  <text x="110" y="295" text-anchor="middle" font-size="9">24V → 5V</text>
  <text x="110" y="308" text-anchor="middle" font-size="8" fill="#a00">ajustar trimpot!</text>
  <line x1="280" y1="105" x2="280" y2="270" class="wire-power"/>
  <line x1="280" y1="270" x2="160" y2="270" class="wire-power"/>
  <circle cx="280" cy="105" r="2"/>
  <line x1="60" y1="290" x2="40" y2="290" class="wire-gnd"/>
  <line x1="40" y1="290" x2="40" y2="145" class="wire-gnd"/>
  <line x1="40" y1="145" x2="153" y2="145" class="wire-gnd"/>
  <line x1="160" y1="290" x2="220" y2="290" class="wire-5v"/>
  <text x="180" y="285" class="pin">+5V</text>

  <rect x="60" y="335" width="100" height="55" class="ic" fill="#fec"/>
  <text x="110" y="355" text-anchor="middle" class="label">LM2596</text>
  <text x="110" y="370" text-anchor="middle" font-size="9">24V → 12V</text>
  <text x="110" y="383" text-anchor="middle" font-size="8" fill="#a00">para fan PWM</text>
  <line x1="280" y1="270" x2="280" y2="345" class="wire-power"/>
  <line x1="280" y1="345" x2="160" y2="345" class="wire-power"/>
  <line x1="60" y1="365" x2="40" y2="365" class="wire-gnd"/>
  <line x1="40" y1="365" x2="40" y2="290" class="wire-gnd"/>
  <line x1="160" y1="365" x2="780" y2="365" class="wire-12v"/>
  <text x="180" y="360" class="pin">+12V</text>

  <!-- ====== ESP32-S3-Zero ====== -->
  <rect x="240" y="240" width="220" height="180" class="ic" fill="#def"/>
  <text x="350" y="265" text-anchor="middle" class="label">ESP32-S3-Zero</text>
  <text x="350" y="280" text-anchor="middle" font-size="9">(Waveshare)</text>
  <line x1="240" y1="295" x2="220" y2="295" class="wire-5v"/>
  <text x="245" y="299" class="pin">5V</text>
  <line x1="240" y1="315" x2="225" y2="315" class="wire-gnd"/>
  <text x="245" y="319" class="pin">GND</text>
  <line x1="225" y1="315" x2="225" y2="145" class="wire-gnd"/>
  <text x="245" y="345" class="pin">GPIO 5 (PWM)</text>
  <line x1="460" y1="345" x2="490" y2="345" class="wire-signal"/>
  <text x="245" y="365" class="pin">GPIO 1 (ADC)</text>
  <line x1="460" y1="365" x2="490" y2="365" class="wire-signal"/>
  <text x="245" y="385" class="pin">GPIO 4 (relé)</text>
  <line x1="460" y1="385" x2="510" y2="385" class="wire-signal"/>
  <text x="245" y="405" class="pin">GPIO 21 (LED)</text>
  <line x1="460" y1="405" x2="780" y2="405" class="wire-signal"/>

  <!-- ====== DRIVER MOSFET ====== -->
  <rect x="510" y="320" width="180" height="120" class="ic" fill="#fec"/>
  <text x="600" y="340" text-anchor="middle" class="label">DRIVER do RELÉ</text>
  <!-- Símbolo MOSFET N -->
  <line x1="540" y1="370" x2="560" y2="370" class="wire-signal"/>
  <text x="535" y="368" class="pin">G</text>
  <text x="555" y="358" font-size="9">220Ω</text>
  <line x1="560" y1="370" x2="580" y2="370" class="wire-signal"/>
  <line x1="580" y1="350" x2="580" y2="390" stroke="#333" stroke-width="2"/>
  <line x1="580" y1="350" x2="600" y2="345" stroke="#333" stroke-width="1.5"/>
  <line x1="580" y1="390" x2="600" y2="395" stroke="#333" stroke-width="1.5"/>
  <line x1="600" y1="345" x2="600" y2="335" stroke="#333" stroke-width="1.5"/>
  <line x1="600" y1="395" x2="600" y2="410" stroke="#333" stroke-width="1.5"/>
  <text x="605" y="368" font-size="9">IRLZ44N</text>
  <text x="608" y="345" class="pin">D</text>
  <text x="608" y="408" class="pin">S</text>
  <!-- Pull-down -->
  <line x1="560" y1="370" x2="560" y2="425" class="wire-signal"/>
  <text x="565" y="400" font-size="9">10kΩ</text>
  <line x1="560" y1="425" x2="660" y2="425" class="wire-gnd"/>
  <line x1="600" y1="410" x2="660" y2="410" class="wire-gnd"/>
  <line x1="660" y1="410" x2="660" y2="425" class="wire-gnd"/>
  <line x1="660" y1="425" x2="660" y2="145" class="wire-gnd"/>
  <!-- Drain → bobina A2 -->
  <line x1="600" y1="335" x2="600" y2="320" class="wire-signal"/>
  <line x1="600" y1="320" x2="465" y2="320" class="wire-signal"/>
  <line x1="465" y1="320" x2="465" y2="195" class="wire-signal"/>
  <text x="470" y="260" font-size="8">A2 (–)</text>
  <!-- Bobina + para 24V via diodo -->
  <line x1="345" y1="195" x2="345" y2="220" class="wire-power"/>
  <line x1="345" y1="220" x2="285" y2="220" class="wire-power"/>
  <line x1="285" y1="220" x2="285" y2="105" class="wire-power"/>
  <text x="290" y="215" font-size="8">A1 (+) ←24V</text>
  <!-- Diodo flyback -->
  <text x="385" y="245" font-size="9" fill="#080">1N4007</text>
  <line x1="465" y1="245" x2="345" y2="245" stroke="#080" stroke-width="1.5"/>
  <polygon points="395,240 395,250 405,245" fill="#080"/>
  <line x1="395" y1="237" x2="395" y2="253" stroke="#080" stroke-width="1.5"/>
  <text x="345" y="240" font-size="8" fill="#080">K</text>
  <text x="455" y="240" font-size="8" fill="#080">A</text>

  <!-- ====== NTC ====== -->
  <rect x="490" y="450" width="160" height="80" class="ic" fill="#fdf"/>
  <text x="570" y="470" text-anchor="middle" class="label">Divisor NTC</text>
  <text x="500" y="490" font-size="9">3V3 ──[100kΩ 1%]──┬─→ ADC</text>
  <text x="500" y="505" font-size="9">                   ├─[NTC 100K]─ GND</text>
  <text x="500" y="520" font-size="9">                   └─[100nF]── GND</text>

  <!-- ====== FAN ====== -->
  <circle cx="820" cy="365" r="40" fill="#cef" stroke="#333" stroke-width="1.5"/>
  <text x="820" y="360" text-anchor="middle" class="label">FAN</text>
  <text x="820" y="375" text-anchor="middle" font-size="9">120mm 12V</text>
  <text x="820" y="388" text-anchor="middle" font-size="9">4-pin PWM</text>
  <line x1="780" y1="365" x2="780" y2="345" class="wire-12v"/>
  <text x="785" y="345" class="pin">+12V</text>
  <line x1="780" y1="365" x2="800" y2="365" class="wire-12v"/>
  <line x1="780" y1="405" x2="800" y2="395" class="wire-signal"/>
  <text x="755" y="402" class="pin">PWM</text>
  <line x1="820" y1="405" x2="820" y2="425" class="wire-gnd"/>
  <line x1="820" y1="425" x2="660" y2="425" class="wire-gnd"/>

  <!-- ====== LED RGB ====== -->
  <rect x="780" y="450" width="160" height="80" class="ic" fill="#fec"/>
  <text x="860" y="470" text-anchor="middle" class="label">WS2812 / WS2812B</text>
  <text x="860" y="488" text-anchor="middle" font-size="9">1× onboard +</text>
  <text x="860" y="502" text-anchor="middle" font-size="9">strip externa opcional</text>
  <text x="860" y="518" text-anchor="middle" font-size="9" fill="#a00">DIN ← GPIO 21</text>
  <line x1="780" y1="405" x2="780" y2="450" class="wire-signal"/>

  <!-- ====== LEGENDA ====== -->
  <rect x="30" y="560" width="940" height="120" fill="#fafafa" stroke="#999"/>
  <text x="40" y="580" class="label">LEGENDA:</text>
  <line x1="120" y1="577" x2="160" y2="577" class="wire-power"/>
  <text x="170" y="582" font-size="10">+24V (potência principal)</text>
  <line x1="320" y1="577" x2="360" y2="577" class="wire-12v"/>
  <text x="370" y="582" font-size="10">+12V (fan)</text>
  <line x1="450" y1="577" x2="490" y2="577" class="wire-5v"/>
  <text x="500" y="582" font-size="10">+5V (ESP32)</text>
  <line x1="580" y1="577" x2="620" y2="577" class="wire-signal"/>
  <text x="630" y="582" font-size="10">Sinal de controle</text>
  <line x1="750" y1="577" x2="790" y2="577" class="wire-gnd"/>
  <text x="800" y="582" font-size="10">GND comum</text>

  <text x="40" y="605" font-size="10" font-weight="bold">FAIL-SAFE LOGIC:</text>
  <text x="40" y="620" font-size="10">• Relé NC: sem energia na bobina = motor LIGADO. Se ESP32 trava, motor continua funcionando.</text>
  <text x="40" y="635" font-size="10">• Pull-down 10kΩ no gate: garante MOSFET OFF se GPIO ficar flutuante.</text>
  <text x="40" y="650" font-size="10">• Diodo 1N4007 antiparalelo na bobina: protege MOSFET do spike de 200V+ ao desligar.</text>
  <text x="40" y="665" font-size="10">• Boot do ESP32: relé inicia desligado, habilita após 2s (teste fan 100%).</text>
</svg>
